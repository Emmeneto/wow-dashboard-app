<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1528"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>

    <!-- Gold gradient for shield -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c8a800"/>
    </linearGradient>

    <!-- Purple glow gradient -->
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a335ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a335ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner panel gradient -->
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1a2e"/>
      <stop offset="100%" stop-color="#12101c"/>
    </linearGradient>

    <!-- Shield clip path -->
    <clipPath id="shieldClip">
      <path d="M200 70 L310 120 L310 230 Q310 310 200 350 Q90 310 90 230 L90 120 Z"/>
    </clipPath>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="400" height="400" rx="40" ry="40" fill="url(#bgGrad)"/>

  <!-- Subtle purple glow behind shield -->
  <ellipse cx="200" cy="200" rx="140" ry="150" fill="url(#purpleGlow)"/>

  <!-- Shield outline -->
  <path d="M200 70 L310 120 L310 230 Q310 310 200 350 Q90 310 90 230 L90 120 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.9"/>

  <!-- Shield inner fill -->
  <path d="M200 80 L302 126 L302 228 Q302 304 200 342 Q98 304 98 228 L98 126 Z"
        fill="url(#panelGrad)" opacity="0.85"/>

  <!-- Horizontal divider lines (dashboard feel) -->
  <line x1="130" y1="170" x2="270" y2="170" stroke="#a335ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="120" y1="245" x2="280" y2="245" stroke="#a335ee" stroke-width="1.5" opacity="0.4"/>

  <!-- Dashboard grid: top row - two panels -->
  <rect x="135" y="135" width="55" height="28" rx="4" fill="#a335ee" opacity="0.2" stroke="#a335ee" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="200" y="135" width="70" height="28" rx="4" fill="#ffd700" opacity="0.15" stroke="#ffd700" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Dashboard grid: middle row - three small indicators -->
  <rect x="130" y="180" width="40" height="55" rx="4" fill="#ffd700" opacity="0.12" stroke="#ffd700" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="180" y="180" width="40" height="55" rx="4" fill="#a335ee" opacity="0.18" stroke="#a335ee" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="230" y="180" width="40" height="55" rx="4" fill="#ffd700" opacity="0.12" stroke="#ffd700" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Dashboard grid: bottom row - wide panel -->
  <rect x="125" y="255" width="150" height="30" rx="4" fill="#a335ee" opacity="0.15" stroke="#a335ee" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Small bar chart in bottom panel -->
  <rect x="135" y="275" width="8" height="6" rx="1" fill="#ffd700" opacity="0.5"/>
  <rect x="148" y="271" width="8" height="10" rx="1" fill="#ffd700" opacity="0.6"/>
  <rect x="161" y="268" width="8" height="13" rx="1" fill="#ffd700" opacity="0.7"/>
  <rect x="174" y="264" width="8" height="17" rx="1" fill="#ffd700" opacity="0.8"/>
  <rect x="187" y="260" width="8" height="21" rx="1" fill="#a335ee" opacity="0.7"/>
  <rect x="200" y="263" width="8" height="18" rx="1" fill="#ffd700" opacity="0.7"/>
  <rect x="213" y="267" width="8" height="14" rx="1" fill="#ffd700" opacity="0.6"/>
  <rect x="226" y="270" width="8" height="11" rx="1" fill="#ffd700" opacity="0.5"/>
  <rect x="239" y="273" width="8" height="8" rx="1" fill="#ffd700" opacity="0.4"/>
  <rect x="252" y="270" width="8" height="11" rx="1" fill="#a335ee" opacity="0.5"/>

  <!-- Small dot indicators in top-left panel -->
  <circle cx="148" cy="145" r="3" fill="#4ade80" opacity="0.8"/>
  <circle cx="160" cy="145" r="3" fill="#ffd700" opacity="0.6"/>
  <circle cx="172" cy="145" r="3" fill="#a335ee" opacity="0.6"/>

  <!-- Number hint in top-right panel -->
  <text x="235" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffd700" opacity="0.6" text-anchor="middle">ilvl</text>

  <!-- Percentage text in middle panels -->
  <text x="150" y="213" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffd700" opacity="0.5" text-anchor="middle">HP</text>
  <text x="200" y="213" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a335ee" opacity="0.6" text-anchor="middle">MP</text>
  <text x="250" y="213" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffd700" opacity="0.5" text-anchor="middle">XP</text>

  <!-- "WD" letters at bottom of shield -->
  <text x="200" y="328" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffd700" text-anchor="middle" letter-spacing="6" opacity="0.7">WD</text>

  <!-- Decorative corner accents on shield -->
  <!-- Top point accent -->
  <circle cx="200" cy="70" r="5" fill="#ffd700" opacity="0.8"/>
  <circle cx="200" cy="70" r="8" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.4"/>

  <!-- Shield side rivets -->
  <circle cx="310" cy="120" r="3" fill="#ffd700" opacity="0.5"/>
  <circle cx="90" cy="120" r="3" fill="#ffd700" opacity="0.5"/>

  <!-- Bottom point accent -->
  <circle cx="200" cy="350" r="4" fill="#a335ee" opacity="0.7"/>
  <circle cx="200" cy="350" r="7" fill="none" stroke="#a335ee" stroke-width="1" opacity="0.4"/>

  <!-- Subtle outer border -->
  <rect width="400" height="400" rx="40" ry="40" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.15"/>
</svg>
